<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Receipt — BaseUSDP</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; padding: 40px 20px; color: #1e293b; }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo h1 { margin: 0; color: #0A0B14; }
    .success-icon { font-size: 48px; text-align: center; margin: 16px 0; }
    .receipt-box { background: #f8fafc; border-radius: 12px; padding: 24px; margin: 24px 0; }
    .receipt-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #e2e8f0; }
    .receipt-row:last-child { border-bottom: none; }
    .receipt-label { color: #64748b; }
    .receipt-value { font-weight: 600; }
    .amount-large { font-size: 32px; font-weight: bold; text-align: center; margin: 16px 0; }
    .tx-hash { word-break: break-all; font-family: monospace; font-size: 12px; color: #64748b; }
    .footer { text-align: center; color: #94a3b8; font-size: 11px; margin-top: 32px; }
  </style>
</head>
<body>
  <div class="logo"><h1>BaseUSDP</h1><p style="color:#64748b;margin:4px 0;">Payment Receipt</p></div>
  <div class="success-icon">&#10003;</div>
  <div class="amount-large">{{amount}} USDC</div>
  <div class="receipt-box">
    <div class="receipt-row"><span class="receipt-label">Payment ID</span><span class="receipt-value">{{paymentId}}</span></div>
    <div class="receipt-row"><span class="receipt-label">Date</span><span class="receipt-value">{{date}}</span></div>
    <div class="receipt-row"><span class="receipt-label">Description</span><span class="receipt-value">{{description}}</span></div>
    <div class="receipt-row"><span class="receipt-label">Fee</span><span class="receipt-value">{{fee}} USDC</span></div>
    <div class="receipt-row"><span class="receipt-label">Network</span><span class="receipt-value">Base</span></div>
    <div class="receipt-row"><span class="receipt-label">Status</span><span class="receipt-value" style="color:#16a34a;">Confirmed</span></div>
  </div>
  <p style="font-size:12px;color:#64748b;">Transaction Hash:</p>
  <p class="tx-hash">{{transactionHash}}</p>
  <p style="font-size:12px;"><a href="https://basescan.org/tx/{{transactionHash}}">View on BaseScan</a></p>
  <div class="footer">This receipt was generated by BaseUSDP. For support, contact support@baseusdp.com.</div>
</body>
</html>
