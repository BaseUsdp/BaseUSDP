upstream app { server app:3000; }

server {
    listen 80;
    server_name baseusdp.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name baseusdp.com;

    ssl_certificate /etc/ssl/certs/baseusdp.crt;
    ssl_certificate_key /etc/ssl/private/baseusdp.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm;

    location /_next/static { proxy_pass http://app; expires 365d; add_header Cache-Control "public, immutable"; }
    location /api { proxy_pass http://app; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location / { proxy_pass http://app; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
}
