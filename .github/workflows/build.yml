name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
      - ".editorconfig"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund

      - name: Verify build tooling
        run: npx vite --version

      - name: Verify project structure
        run: |
          test -f vite.config.ts || (echo "vite.config.ts not found" && exit 1)
          test -f index.html || (echo "index.html not found" && exit 1)
          test -d src || (echo "src/ directory not found" && exit 1)
          echo "Project structure is valid"
