name: Greetings
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]
permissions:
  issues: write
  pull-requests: write
jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: Welcome to BaseUSDP! Thanks for opening your first issue. Please make sure you have read our Contributing Guide and Code of Conduct.
          pr-message: Welcome to BaseUSDP! Thanks for your first pull request. Our team will review it shortly.
