title: "[Idea] "
labels:
  - enhancement
  - community
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea! Please fill out the sections below so the community can discuss and evaluate your proposal.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A brief description of your idea (1-2 sentences).
      placeholder: "I'd like to see..."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this solve? Why is this needed?
      placeholder: "Currently, users have to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work? Include mockups or examples if possible.
      placeholder: "The feature would..."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project does this affect?
      options:
        - Dashboard / UI
        - Privacy / ZK Proofs
        - Wallet Integration
        - Payments / Transfers
        - XMTP Messaging
        - x402 Protocol
        - Swap
        - Developer Experience
        - Documentation
        - CI/CD
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches?
      placeholder: "An alternative would be..."

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information, screenshots, or links that help explain your idea.
