name: Question
description: Ask a question about BaseUSDP
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Before asking, please check:
        - [Documentation](../../docs/)
        - [FAQ](../../docs/guides/troubleshooting.md)
        - [Existing issues](https://github.com/BaseUsdp/BaseUSDP/issues?q=is%3Aissue)
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Using BaseUSDP (deposits, transfers, etc.)
        - Wallet connection
        - Integration / Development
        - Privacy and security
        - Fees and costs
        - Other
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any relevant context, screenshots, or error messages
